<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>LLM Eval Lab</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <!-- app.js must load before Alpine so labApp() exists when x-data evaluates -->
  <script defer src="/static/app.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="labApp()" x-init="init()">
<a class="skip-link" href="#main-content">Skip to content</a>

<div class="site-sticky">
  <header class="site-header">
    <div class="site-header-inner">
      <div class="header-row">
        <div class="site-brand">
          <a href="?view=overview" @click.prevent="setView('overview')">LLM Eval Lab</a>
        </div>
        <div class="header-actions">
          <button type="button"
                  class="ctrl-btn"
                  :aria-expanded="filtersOpen.toString()"
                  aria-controls="lab-controls"
                  @click="toggleFilters()">
            <span x-text="filtersOpen ? 'Hide filters' : 'Filters'"></span>
          </button>
          <span class="ctrl-summary compact" x-show="catalog" x-text="filterSummary()"></span>
        </div>
      </div>
      <nav class="tabs" aria-label="Views">
        <a href="?view=overview"
           class="tab-btn"
           :class="view === 'overview' && 'active'"
           :aria-current="view === 'overview' ? 'page' : null"
           @click.prevent="setView('overview')">Overview</a>
        <a href="?view=report"
           class="tab-btn"
           :class="view === 'report' && 'active'"
           :aria-current="view === 'report' ? 'page' : null"
           @click.prevent="setView('report')">Report</a>
        <a href="?view=performance"
           class="tab-btn"
           :class="view === 'performance' && 'active'"
           :aria-current="view === 'performance' ? 'page' : null"
           @click.prevent="setView('performance')">Performance</a>
        <a href="?view=deepeval"
           class="tab-btn"
           :class="view === 'deepeval' && 'active'"
           :aria-current="view === 'deepeval' ? 'page' : null"
           @click.prevent="setView('deepeval')">DeepEval</a>
        <a href="?view=ragas"
           class="tab-btn"
           :class="view === 'ragas' && 'active'"
           :aria-current="view === 'ragas' ? 'page' : null"
           @click.prevent="setView('ragas')">RAGAS</a>
        <a href="?view=failures"
           class="tab-btn"
           :class="view === 'failures' && 'active'"
           :aria-current="view === 'failures' ? 'page' : null"
           @click.prevent="setView('failures')">Failures</a>
        <a href="?view=promptfoo"
           class="tab-btn"
           :class="view === 'promptfoo' && 'active'"
           :aria-current="view === 'promptfoo' ? 'page' : null"
           @click.prevent="setView('promptfoo')">Promptfoo</a>
      </nav>
    </div>
  </header>

  <div class="lab-controls" id="lab-controls" x-show="filtersOpen" x-cloak>
    <div class="lab-controls-inner" x-show="catalog">
      <div class="ctrl-row">
        <span class="ctrl-label" id="lbl-model">Model</span>
        <div class="pill-group" role="group" aria-labelledby="lbl-model">
          <template x-for="m in (catalog?.models || [])" :key="m">
            <button type="button" class="pill" :class="filters.models.includes(m) && 'active'"
                    :aria-pressed="filters.models.includes(m).toString()"
                    @click="toggle('models', m)" x-text="m"></button>
          </template>
        </div>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label" id="lbl-temp">Temp</span>
        <div class="pill-group" role="group" aria-labelledby="lbl-temp">
          <template x-for="t in (catalog?.temps || [])" :key="t">
            <button type="button" class="pill" :class="filters.temps.includes(t) && 'active'"
                    :aria-pressed="filters.temps.includes(t).toString()"
                    @click="toggle('temps', t)" x-text="t.replace(/^t/, 't=')"></button>
          </template>
        </div>
      </div>
      <div class="ctrl-row">
        <label class="ctrl-label" for="ctrl-dataset">Track</label>
        <select id="ctrl-dataset" class="ctrl-select" x-model="filters.dataset" @change="saveAndReload()">
          <option value="all">All tracks</option>
          <template x-for="d in (catalog?.datasets || [])" :key="d">
            <option :value="d" x-text="d"></option>
          </template>
        </select>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label" id="lbl-fw">Framework</span>
        <div class="pill-group" role="group" aria-labelledby="lbl-fw">
          <template x-for="f in (catalog?.frameworks || [])" :key="f">
            <button type="button" class="pill" :class="filters.frameworks.includes(f) && 'active'"
                    :aria-pressed="filters.frameworks.includes(f).toString()"
                    @click="toggle('frameworks', f)" x-text="f"></button>
          </template>
        </div>
      </div>
      <div class="ctrl-actions">
        <button type="button" class="ctrl-btn" @click="resetFilters()">Reset</button>
      </div>
    </div>
    <div class="lab-controls-inner" x-show="!catalog">
      <span class="ctrl-summary">Loading filters…</span>
    </div>
  </div>
</div>

<div class="wrap">
  <main id="main-content" tabindex="-1">
    Loading…
  </main>
</div>
</body>
</html>
