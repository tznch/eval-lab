- description: ifeval_1000
  vars:
    prompt: Write a 300+ word summary of the wikipedia page "https://en.wikipedia.org/wiki/Raymond_III,_Count_of_Tripoli".
      Do not use any commas and highlight at least 3 sections that has titles in markdown
      format, for example *highlighted section part 1*, *highlighted section part
      2*, *highlighted section part 3*.
    instruction_ids: '["punctuation:no_comma", "detectable_format:number_highlighted_sections",
      "length_constraints:number_words"]'
    instruction_kwargs: '[{}, {"num_highlights": 3}, {"relation": "at least", "num_words":
      300}]'
  assert:
  - type: javascript
    value: "function wordCount(text) {\n  return String(text || '').trim().split(/\\\
      s+/).filter(Boolean).length;\n}\n\nconst output = String(output || '');\nconst\
      \ ids = JSON.parse(context.vars.instruction_ids || '[]');\nconst kwargs = JSON.parse(context.vars.instruction_kwargs\
      \ || '[]');\n\nfor (let i = 0; i < ids.length; i++) {\n  const id = ids[i];\n\
      \  const kw = kwargs[i] || {};\n\n  if (id === 'punctuation:no_comma') {\n \
      \   if (output.includes(',')) return false;\n  }\n  if (id === 'length_constraints:number_words')\
      \ {\n    const n = wordCount(output);\n    const rel = kw.relation || 'at least';\n\
      \    const need = Number(kw.num_words || 0);\n    if (rel === 'at least' &&\
      \ n < need) return false;\n    if (rel === 'at most' && n > need) return false;\n\
      \  }\n  if (id === 'length_constraints:number_sentences') {\n    const n = (output.match(/[.!?]+/g)\
      \ || []).length;\n    const rel = kw.relation || 'at least';\n    const need\
      \ = Number(kw.num_sentences || 0);\n    if (rel === 'at least' && n < need)\
      \ return false;\n    if (rel === 'at most' && n > need) return false;\n  }\n\
      \  if (id === 'detectable_format:number_highlighted_sections') {\n    // Count\
      \ *section* or **section** style highlights\n    const n = (output.match(/\\\
      *[^*\\n]+\\*/g) || []).length;\n    const need = Number(kw.num_highlights ||\
      \ 0);\n    if (n < need) return false;\n  }\n  if (id === 'detectable_format:number_bullet_lists')\
      \ {\n    const n = (output.match(/^\\s*[-*•]\\s+/gm) || []).length;\n    const\
      \ need = Number(kw.num_bullets || kw.num_highlights || 1);\n    if (n < need)\
      \ return false;\n  }\n  if (id === 'startend:end_checker') {\n    const ender\
      \ = String(kw.end_phrase || '').trim();\n    if (ender && !output.trim().endsWith(ender))\
      \ return false;\n  }\n  if (id === 'startend:quotation') {\n    const t = output.trim();\n\
      \    if (!(t.startsWith('\"') && t.endsWith('\"'))) return false;\n  }\n}\n\
      return true;"
